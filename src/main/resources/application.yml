spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/sag;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration

  mail:
    host: ${SPRING_MAIL_HOST:smtp.sendgrid.net}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:apikey}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:}

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.hibernate.orm.jdbc.extract: trace

spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    org.springframework.security: debug
    com.swapandgo.sag.security: debug

jwt:
  secret: "your-super-secret-key-that-should-be-at-least-32-characters-long-for-hs256"
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

